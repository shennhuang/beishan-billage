<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>北山好物 Beishan Village — 在地精選農產品</title>
  <meta name="description" content="北山好物 Beishan Village，嚴選在地新鮮農產品，產地直送到你家。">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Background Glow -->
  <div class="bg-glow"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="#">
        <div class="logo-icon">🌿</div>
        <span class="logo-text">北山好物</span>
      </a>
      <button class="cart-toggle" id="cart-toggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="9" cy="21" r="1" />
          <circle cx="20" cy="21" r="1" />
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
        </svg>
        購物車
        <span class="cart-badge" id="cart-badge">0</span>
      </button>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <h1><span class="emoji-leaf">🌾</span> 北山精選好物</h1>
    <p>來自北山的用心栽培，嚴選在地優質農產品，新鮮直送到你家</p>
  </section>

  <!-- Products -->
  <main class="products-section">
    <div class="products-grid" id="products-grid"></div>
  </main>

  <!-- Cart Overlay -->
  <div class="cart-overlay" id="cart-overlay"></div>

  <!-- Cart Drawer -->
  <aside class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
      <h2>🛒 購物車</h2>
      <button class="cart-close" id="cart-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <div class="cart-body" id="cart-body"></div>
    <div class="cart-footer" id="cart-footer" style="display:none"></div>
  </aside>

  <!-- Product Detail Modal -->
  <div class="product-detail-overlay" id="product-detail-overlay">
    <div class="product-detail-modal" id="product-detail-modal">
      <button class="product-detail-close" id="product-detail-close" aria-label="關閉">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div class="pdm-image-wrap">
        <img id="pdm-image" src="" alt="" loading="lazy">
      </div>
      <div class="pdm-info">
        <p class="pdm-tag" id="pdm-tag">精選農產</p>
        <h2 class="pdm-title" id="pdm-title"></h2>
        <p class="pdm-desc" id="pdm-desc"></p>
        <div class="pdm-divider"></div>
        <div class="pdm-footer">
          <div class="pdm-price-wrap">
            <span class="pdm-price-label">售價</span>
            <span class="pdm-price" id="pdm-price"></span>
          </div>
          <button class="pdm-btn-add" id="pdm-btn-add">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            加入購物車
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Checkout Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12" />
    </svg>
    <span></span>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 Beishan Village. All rights reserved. | <a href="admin.html" class="footer-admin-link">管理員登入</a></p>
  </footer>

  <!-- Scripts (order matters) -->
  <script src="js/cart.js"></script>
  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
