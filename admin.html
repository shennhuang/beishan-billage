<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>北山好物 — 後台管理</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/admin.css">
</head>

<body>

  <!-- ===== Login Screen ===== -->
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <div class="login-logo">🌿</div>
      <h1>北山好物 後台管理</h1>
      <p class="login-subtitle">請輸入管理員帳號密碼登入</p>
      <div class="login-form">
        <div class="input-group">
          <label for="login-username">帳號</label>
          <div class="token-input-wrap">
            <input type="text" id="login-username" placeholder="請輸入帳號" autocomplete="username">
          </div>
        </div>
        <div class="input-group">
          <label for="login-password">密碼</label>
          <div class="token-input-wrap">
            <input type="password" id="login-password" placeholder="請輸入密碼" autocomplete="current-password">
            <button class="token-toggle" id="password-toggle" type="button" title="顯示/隱藏">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <button class="btn-login" id="btn-login">
          <span class="btn-login-text">登入</span>
          <span class="btn-login-loading" style="display:none">驗證中...</span>
        </button>
        <p class="login-error" id="login-error"></p>
      </div>
    </div>
  </div>

  <!-- ===== Admin Panel (hidden until login) ===== -->
  <div class="admin-panel" id="admin-panel" style="display:none">

    <!-- Header -->
    <header class="admin-header">
      <div class="admin-header-inner">
        <a class="admin-logo" href="admin.html">
          <span class="admin-logo-icon">🌿</span>
          <span class="admin-logo-text">北山好物</span>
          <span class="admin-badge">管理後台</span>
        </a>
        <div class="admin-header-actions">
          <a href="index.html" target="_blank" class="btn-outline btn-sm">🔗 前往前台</a>
          <button class="btn-outline btn-sm btn-danger-outline" id="btn-logout">登出</button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="admin-main">
      <!-- Stats Bar -->
      <div class="stats-bar" id="stats-bar">
        <div class="stat-card">
          <div class="stat-icon">📦</div>
          <div class="stat-info">
            <span class="stat-value" id="stat-total">-</span>
            <span class="stat-label">商品總數</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">💰</div>
          <div class="stat-info">
            <span class="stat-value" id="stat-avg-price">-</span>
            <span class="stat-label">平均價格</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🙈</div>
          <div class="stat-info">
            <span class="stat-value" id="stat-hidden">-</span>
            <span class="stat-label">已隱藏商品</span>
          </div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <h2>商品管理</h2>
        <button class="btn-primary" id="btn-add-product">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          新增商品
        </button>
      </div>

      <!-- Products Table -->
      <div class="table-wrap">
        <table class="products-table" id="products-table">
          <thead>
            <tr>
              <th style="width:60px">圖片</th>
              <th>商品名稱</th>
              <th>描述</th>
              <th style="width:100px">價格</th>
              <th style="width:80px">狀態</th>
              <th style="width:140px">操作</th>
            </tr>
          </thead>
          <tbody id="products-tbody"></tbody>
        </table>
        <div class="table-loading" id="table-loading">
          <div class="spinner"></div>
          <p>載入商品資料中...</p>
        </div>
        <div class="table-empty" id="table-empty" style="display:none">
          <p>🌱 目前沒有任何商品，點擊「新增商品」開始吧！</p>
        </div>
      </div>
    </main>
  </div>

  <!-- ===== Product Modal ===== -->
  <div class="modal-overlay" id="product-modal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">新增商品</h2>
        <button class="modal-close" id="modal-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <form class="modal-body" id="product-form">
        <input type="hidden" id="form-id">
        <div class="form-group">
          <label for="form-title">商品名稱 *</label>
          <input type="text" id="form-title" required placeholder="例：有機高山茶">
        </div>
        <div class="form-group">
          <label for="form-desc">商品描述 *</label>
          <textarea id="form-desc" required placeholder="例：海拔 1200 公尺以上手採，自然農法栽培" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="form-price">價格 (NT$) *</label>
          <input type="number" id="form-price" required min="1" placeholder="0">
        </div>
        <div class="form-group">
          <label>商品圖片</label>
          <div class="image-upload" id="image-upload">
            <input type="file" id="form-image" accept="image/*" style="display:none">
            <div class="image-preview" id="image-preview">
              <div class="image-placeholder" id="image-placeholder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                  <circle cx="8.5" cy="8.5" r="1.5" />
                  <polyline points="21 15 16 10 5 21" />
                </svg>
                <span>點擊或拖拽上傳圖片</span>
                <span class="image-hint">建議尺寸 800×800，最大 2MB</span>
              </div>
              <img id="preview-img" style="display:none" alt="預覽">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-outline" id="modal-cancel">取消</button>
          <button type="submit" class="btn-primary" id="modal-submit">
            <span class="btn-submit-text">儲存商品</span>
            <span class="btn-submit-loading" style="display:none">儲存中...</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== Delete Confirm Modal ===== -->
  <div class="modal-overlay" id="delete-modal" style="display:none">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>⚠️ 確認刪除</h2>
      </div>
      <div class="modal-body">
        <p>確定要刪除「<strong id="delete-product-name"></strong>」嗎？此操作無法復原。</p>
      </div>
      <div class="modal-footer">
        <button class="btn-outline" id="delete-cancel">取消</button>
        <button class="btn-danger" id="delete-confirm">確認刪除</button>
      </div>
    </div>
  </div>

  <!-- ===== Product Preview Modal ===== -->
  <div class="modal-overlay" id="preview-modal" style="display:none">
    <div class="modal preview-modal-inner">
      <div class="modal-header">
        <h2 id="preview-modal-title">商品詳情</h2>
        <button class="modal-close" id="preview-modal-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="modal-body preview-body">
        <div class="preview-image-wrap">
          <img id="preview-product-img" src="" alt="" class="preview-product-img">
        </div>
        <div class="preview-meta">
          <span class="status-badge" id="preview-status-badge"></span>
          <h3 class="preview-product-name" id="preview-product-name"></h3>
          <p class="preview-product-desc" id="preview-product-desc"></p>
          <div class="preview-price-row">
            <span class="preview-price-label">售價</span>
            <span class="preview-price-value" id="preview-product-price"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Toast ===== -->
  <div class="admin-toast" id="admin-toast">
    <span class="toast-icon" id="toast-icon">✅</span>
    <span class="toast-msg" id="toast-msg"></span>
  </div>

  <script src="js/admin.js"></script>
</body>

</html>
